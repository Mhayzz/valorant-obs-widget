<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Valo Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --accent: #ffffff;
  --card-bg: rgba(0,0,0,0.75);
  --text-primary: #ffffff;
  --text-secondary: rgba(255,255,255,0.6);
  --text-tertiary: rgba(255,255,255,0.3);
  --w: 300px;
}

body {
  background:transparent;
  width:var(--w);
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
}

.container {
  display:flex; flex-direction:column; gap:5px; padding:2px;
  opacity:0; transform:translateY(6px);
}
.container.show {
  opacity:1; transform:translateY(0);
  transition:opacity .2s ease, transform .2s ease;
}

.card {
  border-radius:10px;
  background:var(--card-bg);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.07);
  overflow:hidden;
}

/* OBS mode: simulate frosted glass without backdrop-filter */
body.obs-mode .card {
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
  background:var(--card-bg-obs);
  border:1px solid rgba(255,255,255,0.1);
}


/* ── Rank card ───────────────────────────────────────── */
.rank-card {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px 10px 10px;
}
.rank-icon {
  flex-shrink:0; width:46px; height:46px;
  display:flex; align-items:center; justify-content:center;
}
.rank-icon img {
  width:46px; height:46px; object-fit:contain;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.6));
}
.rank-info { flex:1; display:flex; flex-direction:column; gap:4px; }
.rank-name { font-weight:600; font-size:16px; color:#fff; line-height:1; display:flex; align-items:center; gap:6px; width:100%; }
.rank-name .peak-inline { display:none; font-size:9px; font-weight:600; letter-spacing:.7px; text-transform:uppercase; color:var(--text-tertiary); align-items:center; gap:3px; }
.rank-name .peak-inline.align-left { margin-left:8px; }
.rank-name .peak-inline.align-right { margin-left:auto; }
.rank-name .peak-inline img { width:20px; height:20px; vertical-align:middle; }

.peak-rank {
  font-size:9px; font-weight:600; letter-spacing:.7px;
  text-transform:uppercase; color:var(--text-tertiary);
  line-height:1; margin-top:1px;
}
.peak-rank span { color:rgba(255,255,255,.45); font-family:'DM Mono',monospace; }
.peak-icon { width:22px; height:22px; vertical-align:middle; margin-left:4px; }

.session-rr {
  font-size:9px; font-weight:600; letter-spacing:.7px;
  text-transform:uppercase; color:var(--text-tertiary);
  line-height:1; margin-top:1px;
}
.session-rr .val { font-family:'DM Mono',monospace; }
.session-rr .pos { color:rgba(95,255,181,.8); }
.session-rr .neg { color:rgba(255,80,96,.8); }

.rr-row { display:flex; align-items:center; gap:6px; }
.rr-label {
  font-family:'DM Mono',monospace; font-size:11px;
  color:var(--text-tertiary); min-width:34px;
}
.track { flex:1; height:2px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; }
.fill {
  height:100%; border-radius:2px;
  background:var(--accent);
  opacity:.6;
  transition:width 0.6s ease;
}

.rr-badge {
  font-family:'DM Mono',monospace; font-size:13px; font-weight:500;
  min-width:36px; text-align:right; line-height:1; flex-shrink:0;
}
.rr-badge .sub {
  display:block; font-size:8px; letter-spacing:1px;
  opacity:.35; margin-top:2px; text-align:right;
  font-family:'DM Sans',sans-serif;
}
.rr-badge.pos { color:#5fffb5; }
.rr-badge.neg { color:#ff5060; }
.rr-badge.neu { color:rgba(255,255,255,.2); }
/* ── Match card ──────────────────────────────────────── */
.match-card {
  display:flex; align-items:center; gap:9px;
  padding:7px 14px 7px 10px;
}
.match-agent-wrap {
  flex-shrink:0; width:30px; height:30px; border-radius:7px;
  overflow:hidden; background:rgba(255,255,255,.06);
  display:flex; align-items:center; justify-content:center;
}
.match-agent-wrap img { width:30px; height:30px; object-fit:cover; }
.match-info { flex:1; min-width:0; }
.match-agent-name { font-size:12px; font-weight:600; color:var(--text-secondary); line-height:1; }
.match-kda-map {
  font-family:'DM Mono',monospace; font-size:9px;
  color:var(--text-tertiary); margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.match-result {
  font-size:10px; font-weight:700; letter-spacing:.8px;
  padding:3px 8px; border-radius:5px; flex-shrink:0;
}
.match-result.win  { color:#5fffb5; background:rgba(95,255,181,.1); }
.match-result.loss { color:#ff5060; background:rgba(255,80,96,.1); }
.match-result.draw { color:rgba(255,255,255,.3); background:rgba(255,255,255,.05); }

/* ── Streak card ─────────────────────────────────────── */
.streak-card {
  display:flex; align-items:center;
  padding:8px 14px; gap:5px;
}
.streak-label {
  font-size:9px; font-weight:600; letter-spacing:1px;
  text-transform:uppercase; color:var(--text-secondary);
  margin-right:4px; flex-shrink:0;
}
.streak-dots { display:flex; gap:4px; align-items:center; }
.s-dot {
  width:22px; height:5px; border-radius:3px;
  transition: background .3s;
}
.s-dot.win  { background:#5fffb5; opacity:.75; }
.s-dot.loss { background:#ff5060; opacity:.75; }
.s-dot.draw { background:rgba(255,255,255,.2); }
.s-dot.empty { background:rgba(255,255,255,.07); }

/* ── Loading ─────────────────────────────────────────── */
.loading-msg {
  padding:16px;
  text-align:center;
  font-size:12px;
  font-weight:500;
  color:rgba(255,255,255,.4);
  letter-spacing:.5px;
}
.loading-msg.hidden { display:none; }
.overlay-content.hidden { display:none; }

/* ── Rank animations ─────────────────────────────────────── */
@keyframes rankup-glow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes rankdown-glow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.rank-card.animate-rankup {
  position: relative;
  background: linear-gradient(90deg, rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
              linear-gradient(135deg, #5fffb5, rgba(95, 255, 181, 0.3), #5fffb5);
  background-size: 100% 100%, 200% 200%;
  animation: rankup-glow 0.8s ease-in-out;
  border: 2px solid #5fffb5;
  box-shadow: 0 0 30px rgba(95, 255, 181, 0.6), inset 0 0 30px rgba(95, 255, 181, 0.2);
}

.rank-card.animate-rankdown {
  position: relative;
  background: linear-gradient(90deg, rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
              linear-gradient(135deg, #ff5060, rgba(255, 80, 96, 0.3), #ff5060);
  background-size: 100% 100%, 200% 200%;
  animation: rankdown-glow 0.8s ease-in-out;
  border: 2px solid #ff5060;
  box-shadow: 0 0 30px rgba(255, 80, 96, 0.6), inset 0 0 30px rgba(255, 80, 96, 0.2);
}

.rank-card.animate-win {
  position: relative;
  background: linear-gradient(90deg, rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
              linear-gradient(135deg, #5fffb5, rgba(95, 255, 181, 0.3), #5fffb5);
  background-size: 100% 100%, 200% 200%;
  animation: rankup-glow 0.8s ease-in-out;
  border: 2px solid #5fffb5;
  box-shadow: 0 0 30px rgba(95, 255, 181, 0.6), inset 0 0 30px rgba(95, 255, 181, 0.2);
}

.rank-card.animate-lose {
  position: relative;
  background: linear-gradient(90deg, rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
              linear-gradient(135deg, #ff5060, rgba(255, 80, 96, 0.3), #ff5060);
  background-size: 100% 100%, 200% 200%;
  animation: rankdown-glow 0.8s ease-in-out;
  border: 2px solid #ff5060;
  box-shadow: 0 0 30px rgba(255, 80, 96, 0.6), inset 0 0 30px rgba(255, 80, 96, 0.2);
}
</style>
</head>
<body>

<div class="container" id="container">
  <!-- Loading message -->
  <div class="card loading-msg" id="loadingMsg">Chargement des données...</div>
  <!-- Rank -->
  <div class="card rank-card overlay-content hidden">
    <div class="rank-icon">
      <img id="ico" src="" alt="" style="display:none">
    </div>
    <div class="rank-info">
      <div class="rank-name"><span id="rankName">—</span><span class="peak-inline" id="peakInline"></span></div>
      <div class="peak-rank" id="peakRank" style="display:none"></div>
      <div class="session-rr" id="sessionRR" style="display:none"></div>
      <div class="rr-row">
        <div class="rr-label" id="rrLabel">0 RR</div>
        <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="rr-badge neu" id="badge">
      <span id="badgeNum">—</span>
      <span class="sub">LAST</span>
    </div>
  </div>

  <!-- Last match -->
  <div class="card match-card overlay-content hidden" id="matchCard" style="display:none">
    <div class="match-agent-wrap">
      <img id="matchIcon" src="" alt="" style="display:none">
    </div>
    <div class="match-info">
      <div class="match-agent-name" id="matchAgent">—</div>
      <div class="match-kda-map" id="matchKda">—</div>
    </div>
    <div class="match-result draw" id="matchResult">?</div>
  </div>

  <!-- Streak -->
  <div class="card streak-card overlay-content hidden" id="streakCard" style="display:none">
    <span class="streak-label">STREAK</span>
    <div class="streak-dots" id="streakDots"></div>
  </div>
</div>

<script>
let cfg = null;
let prevChange = undefined;
const SS_KEY = 'valo_session_start_rr';
let IS_PREVIEW = false;
try { IS_PREVIEW = new URLSearchParams(window.location.search).has('preview') || window.self !== window.top; } catch(e) { IS_PREVIEW = true; }

// ── Applique les options d'affichage ────────────────────────
function applyDisplay(d) {
  const r = document.documentElement;
  let opacity = d.bg_opacity ?? 0.75;
  if (opacity > 1) opacity = opacity / 100;
  r.style.setProperty('--card-bg', `rgba(0,0,0,${opacity})`);
  // OBS: dark solid background matching preview look
  r.style.setProperty('--card-bg-obs', `rgba(18,18,22,${Math.min(1, opacity + 0.25)})`);
  r.style.setProperty('--accent', d.accent_color || '#ffffff');
  r.style.setProperty('--text-primary', d.text_primary || '#ffffff');
  r.style.setProperty('--text-secondary', d.text_secondary || 'rgba(255,255,255,0.6)');
  r.style.setProperty('--text-tertiary', d.text_tertiary || 'rgba(255,255,255,0.3)');
  r.style.setProperty('--w', (d.widget_width || 300) + 'px');
  document.body.style.width = (d.widget_width || 300) + 'px';

  // Peak rank: inline (next to rank name) or below
  const peakInline = d.peak_inline ?? false;
  const peakAlignEl = document.getElementById('peakInline');
  peakAlignEl.className = 'peak-inline align-' + (d.peak_align || 'left');
  if (!(d.show_peak_rank ?? true)) {
    document.getElementById('peakRank').style.display = 'none';
    peakAlignEl.style.display = 'none';
  } else if (peakInline) {
    document.getElementById('peakRank').style.display = 'none';
    peakAlignEl.style.display = 'flex';
  } else {
    document.getElementById('peakRank').style.display = 'block';
    peakAlignEl.style.display = 'none';
  }
  document.getElementById('sessionRR').style.display =
    (d.show_session_rr ?? true) ? 'block' : 'none';
  document.getElementById('matchCard').style.display =
    (d.show_last_match ?? true) ? 'flex' : 'none';
  document.getElementById('streakCard').style.display =
    (d.show_streak ?? true) ? 'flex' : 'none';
}

// ── Session RR ───────────────────────────────────────────────
let sessionStartRR = null;

function initSessionRR(rr) {
  const stored = sessionStorage.getItem(SS_KEY);
  sessionStartRR = stored !== null ? parseInt(stored, 10) : rr;
  if (stored === null) sessionStorage.setItem(SS_KEY, rr);
  renderSessionRR(rr);
}

// ── Animations ──────────────────────────────────────────────
let lastRankTier = null;
let lastMatchId = null;

function triggerAnimation(type) {
  const rankCard = document.querySelector('.rank-card');
  if (!rankCard) return;

  rankCard.classList.remove('animate-rankup', 'animate-rankdown', 'animate-win', 'animate-lose');
  void rankCard.offsetWidth; // Trigger reflow to reset animation
  rankCard.classList.add(`animate-${type}`);

  setTimeout(() => {
    rankCard.classList.remove('animate-rankup', 'animate-rankdown', 'animate-win', 'animate-lose');
  }, 800);
}

function renderSessionRR(rr) {
  if (!(cfg?.display?.show_session_rr ?? true)) return;
  if (sessionStartRR === null) return;
  const diff = rr - sessionStartRR;
  const el = document.getElementById('sessionRR');
  if (diff === 0) { el.style.display = 'none'; return; }
  const cls = diff > 0 ? 'pos' : 'neg';
  el.innerHTML = `SESSION <span class="val ${cls}">${diff > 0 ? '+' : ''}${diff} RR</span>`;
  el.style.display = 'block';
}

// ── Rank (real API - only used in OBS mode) ──────────────────
function showOverlay() {
  document.getElementById('loadingMsg').classList.add('hidden');
  document.querySelectorAll('.overlay-content').forEach(el => el.classList.remove('hidden'));
}

async function refreshRank() {
  try {
    const res = await fetch('/api/rank');
    let d = await res.json();
    if (!res.ok) return;

    showOverlay();

    // Detect rank changes for animation
    if ((cfg?.display?.realtime_notifications ?? true) && (cfg?.display?.animation_type ?? 'rank') === 'rank' && lastRankTier !== null) {
      if (d.tier > lastRankTier) triggerAnimation('rankup');
      else if (d.tier < lastRankTier) triggerAnimation('rankdown');
    }
    lastRankTier = d.tier;

    document.getElementById('rankName').textContent = d.rank;
    document.getElementById('rrLabel').textContent  = d.rr + ' RR';
    document.getElementById('fill').style.width     = Math.min(100, Math.max(0, d.rr)) + '%';

    if (d.tier > 0) {
      const ico = document.getElementById('ico');
      ico.style.display = 'block';
      ico.src = d.rank_icon;
      ico.onerror = () => {
        ico.src = `https://media.valorant-api.com/competitivetiers/564d8e28-c226-3180-6285-e48a390db8b1/${d.tier}/largeicon.png`;
      };
    }

    const peakEl = document.getElementById('peakRank');
    const peakInline = document.getElementById('peakInline');
    if ((cfg?.display?.show_peak_rank ?? true) && d.peak_rank) {
      const tier = d.peak_tier;
      const peakImg = `<img src="https://media.valorant-api.com/competitivetiers/564d8e28-c226-3180-6285-e48a390db8b1/${tier}/largeicon.png" alt="" class="peak-icon" onerror="this.src='https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/${tier}/largeicon.png'">`;
      peakEl.innerHTML = `PEAK ${peakImg}`;
      peakInline.innerHTML = 'PEAK ' + peakImg;
      // Set display and alignment based on settings
      peakInline.className = 'peak-inline align-' + (cfg?.display?.peak_align || 'left');
      if (cfg?.display?.peak_inline) {
        peakEl.style.display = 'none';
        peakInline.style.display = 'flex';
      } else {
        peakEl.style.display = 'block';
        peakInline.style.display = 'none';
      }
    } else {
      peakEl.style.display = 'none';
      peakInline.style.display = 'none';
    }

    const chg = d.rr_change;
    const badge = document.getElementById('badge');
    badge.className = 'rr-badge ' + (chg === null ? 'neu' : chg > 0 ? 'pos' : chg < 0 ? 'neg' : 'neu');
    document.getElementById('badgeNum').textContent = chg === null ? '—' : (chg > 0 ? '+' : '') + chg;
    prevChange = chg;

    initSessionRR(d.rr);
  } catch(e) {}
}

// ── Matches (real API - only used in OBS mode) ───────────────
async function refreshMatches() {
  const showMatch  = cfg?.display?.show_last_match ?? true;
  const showStreak = cfg?.display?.show_streak     ?? true;
  if (!showMatch && !showStreak) return;

  try {
    const size = showStreak ? 5 : 1;
    const res  = await fetch(`/api/matches?size=${size}`);
    if (!res.ok) return;
    const matches = await res.json();
    if (!matches?.length) return;

    if (showMatch) {
      const m = matches[0];

      // Detect match result changes for animation
      const matchKey = `${m.agent}${m.kills}${m.deaths}${m.assists}`;
      if ((cfg?.display?.realtime_notifications ?? true) && (cfg?.display?.animation_type ?? 'rank') === 'match' && lastMatchId !== null && lastMatchId !== matchKey) {
        if (m.won === true) triggerAnimation('win');
        else if (m.won === false) triggerAnimation('lose');
      }
      lastMatchId = matchKey;

      document.getElementById('matchCard').style.display = 'flex';
      const icon = document.getElementById('matchIcon');
      if (m.agent_icon) {
        icon.src = m.agent_icon;
        icon.style.display = 'block';
        icon.onerror = () => { icon.style.display = 'none'; };
      }
      document.getElementById('matchAgent').textContent = m.agent;
      document.getElementById('matchKda').textContent =
        `${m.kills}/${m.deaths}/${m.assists}${m.map ? ' • ' + m.map : ''}`;
      const res2 = document.getElementById('matchResult');
      if (m.won === null)  { res2.className = 'match-result draw'; res2.textContent = '?'; }
      else if (m.won)      { res2.className = 'match-result win';  res2.textContent = 'V'; }
      else                 { res2.className = 'match-result loss'; res2.textContent = 'D'; }
    }

    if (showStreak) {
      document.getElementById('streakCard').style.display = 'flex';
      const dots = document.getElementById('streakDots');
      dots.innerHTML = '';
      const filled = matches.slice(0, 5).reverse();
      for (let i = 0; i < 5; i++) {
        const dot = document.createElement('div');
        const m = filled[i];
        if (!m)                     dot.className = 's-dot empty';
        else if (m.won === true)    dot.className = 's-dot win';
        else if (m.won === false)   dot.className = 's-dot loss';
        else                        dot.className = 's-dot draw';
        dots.appendChild(dot);
      }
    }
  } catch(e) {}
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  // Clear old session data
  sessionStorage.clear();

  // 1. Load display settings from localStorage (instant, synchronous)
  try {
    const stored = localStorage.getItem('valo_display');
    if (stored) {
      cfg = { display: JSON.parse(stored) };
    }
  } catch(e) {}

  // 2. Fallback: load from local API (fast, same server)
  if (!cfg) {
    try {
      const res = await fetch('/api/config');
      cfg = await res.json();
    } catch(e) {
      cfg = { display: {} };
    }
  }

  // 3. Apply display and show container immediately
  applyDisplay(cfg.display || {});
  document.getElementById('container').classList.add('show');

  // ── Common listeners (both preview and OBS modes) ──────────────
  // Listen for account changes from setup page (real-time refresh)
  window.addEventListener('storage', (e) => {
    if (e.key === 'valo_account_change') {
      // Account changed, refresh rank and matches immediately
      lastRankTier = null;
      lastMatchId = null; // Reset tracking for new account
      refreshRank();
      refreshMatches();
    }
    if (e.key === 'valo_test_animation') {
      // Test animation from setup page
      try {
        const msg = JSON.parse(e.newValue);
        console.log('Test animation:', msg);
        triggerAnimation(msg.type);
      } catch(e) {}
    }
  });

  // Listen for test messages from parent window (iframe mode)
  window.addEventListener('message', (e) => {
    if (e.data?.type === 'ranktest' && e.data?.detail?.type) {
      triggerAnimation(e.data.detail.type);
    }
    if (e.data?.type === 'matchtest' && e.data?.detail?.type) {
      triggerAnimation(e.data.detail.type);
    }
  });

  // Listen for custom events (direct page mode)
  window.addEventListener('valoRankTest', (e) => {
    triggerAnimation(e.detail.type);
  });

  window.addEventListener('valoMatchTest', (e) => {
    triggerAnimation(e.detail.type);
  });

  // 4. PREVIEW MODE: show loading, fetch real data, sync settings via localStorage
  if (IS_PREVIEW) {
    refreshRank();
    refreshMatches();

    // Poll localStorage every 150ms for instant display settings sync
    let lastCheck = localStorage.getItem('valo_display');
    setInterval(() => {
      try {
        const stored = localStorage.getItem('valo_display');
        if (stored !== lastCheck) {
          lastCheck = stored;
          cfg.display = JSON.parse(stored);
          applyDisplay(cfg.display);
        }
      } catch(e) {}
    }, 150);
    return;
  }

  // 5. OBS MODE: apply obs-mode class for frosted glass simulation
  document.body.classList.add('obs-mode');
  refreshRank();
  refreshMatches();
  setInterval(refreshRank, 10000);
  setInterval(refreshMatches, 10000);

  // Poll localStorage for live config updates from setup page
  let lastCheck = localStorage.getItem('valo_display');
  setInterval(() => {
    try {
      const stored = localStorage.getItem('valo_display');
      if (stored !== lastCheck) {
        lastCheck = stored;
        cfg.display = JSON.parse(stored);
        applyDisplay(cfg.display);
      }
    } catch(e) {}
  }, 1000);

  // Connect to rank stream (real-time updates from server)
  if (cfg?.display?.realtime_notifications ?? true) {
    const rankSource = new EventSource('/api/rank-stream');
    rankSource.onmessage = (event) => {
      if (event.data === 'connected') return;
      try {
        const msg = JSON.parse(event.data);
        if ((cfg?.display?.animation_type ?? 'rank') === 'rank' && (msg.type === 'rankup' || msg.type === 'rankdown')) {
          triggerAnimation(msg.type);
          lastRankTier = msg.tier;
        }
      } catch(e) {}
    };
  }

  // Connect to match stream (real-time updates from server)
  if (cfg?.display?.realtime_notifications ?? true) {
    const matchSource = new EventSource('/api/matches-stream');
    matchSource.onopen = () => {
      console.log('Match stream connected');
    };
    matchSource.onmessage = (event) => {
      if (event.data === 'connected') {
        console.log('Match stream ready');
        return;
      }
      try {
        const msg = JSON.parse(event.data);
        console.log('Match event received:', msg);
        if ((cfg?.display?.animation_type ?? 'rank') === 'match' && (msg.type === 'win' || msg.type === 'lose')) {
          console.log('Triggering animation:', msg.type);
          triggerAnimation(msg.type);
          // Force refresh matches to update display
          refreshMatches();
          lastMatchId = null;
        }
      } catch(e) {
        console.error('Match parse error:', e);
      }
    };
    matchSource.onerror = () => {
      console.error('Match stream error');
    };
  }

  // Reload config from API every 10 seconds (fallback for account changes)
  setInterval(async () => {
    try {
      const res = await fetch('/api/config');
      if (res.ok) {
        const newCfg = await res.json();
        cfg = newCfg;
        applyDisplay(cfg.display || {});
      }
    } catch(e) {}
  }, 10000);
}

init();
</script>
</body>
</html>
