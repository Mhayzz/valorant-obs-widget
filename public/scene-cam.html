<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scene Cam</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:1920px; height:1080px; overflow:hidden; background:#03030a; font-family:'DM Sans',sans-serif; }

#space { position:absolute; inset:0; z-index:0; }

.nebula { position:absolute; border-radius:50%; filter:blur(120px); opacity:0.13; animation:nebula-drift 25s ease-in-out infinite alternate; }
.n1 { width:800px; height:550px; background:radial-gradient(ellipse,#2a0f5e,transparent); top:-150px; left:-150px; animation-duration:28s; }
.n2 { width:600px; height:420px; background:radial-gradient(ellipse,#08205a,transparent); bottom:-80px; right:300px; animation-duration:20s; animation-delay:-9s; }
.n3 { width:450px; height:320px; background:radial-gradient(ellipse,#150830,transparent); top:250px; left:700px; animation-duration:35s; animation-delay:-15s; }
@keyframes nebula-drift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(25px,18px) scale(1.07)} }

.layout { position:absolute; inset:0; z-index:10; display:flex; align-items:center; justify-content:center; gap:36px; padding:44px 50px; }

/* CAM */
.cam-zone { flex:0 0 auto; position:relative; width:880px; height:495px; }
.cam-placeholder { width:100%; height:100%; border-radius:22px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.08); font-size:12px; letter-spacing:2px; text-transform:uppercase; }
.cam-frame { position:absolute; inset:-2px; border-radius:24px; border:1px solid rgba(255,255,255,0.06); pointer-events:none; }

.corner { position:absolute; width:22px; height:22px; }
.corner::before,.corner::after { content:''; position:absolute; background:rgba(160,120,255,0.55); }
.corner::before { width:100%; height:1.5px; top:0; left:0; }
.corner::after  { width:1.5px; height:100%; top:0; left:0; }
.corner.tl { top:-3px; left:-3px; }
.corner.tr { top:-3px; right:-3px; transform:rotate(90deg); }
.corner.bl { bottom:-3px; left:-3px; transform:rotate(270deg); }
.corner.br { bottom:-3px; right:-3px; transform:rotate(180deg); }

/* COLONNE DROITE */
.right-col { flex:0 0 370px; height:540px; display:flex; flex-direction:column; gap:14px; }

.live-badge { display:flex; align-items:center; gap:7px; padding:8px 14px; background:rgba(0,0,0,0.55); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.06); border-radius:10px; width:fit-content; }
.dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.15); flex-shrink:0; }
.dot.live { background:#ff4040; animation:pulse 1.8s ease infinite; }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(255,64,64,.5)} 70%{box-shadow:0 0 0 5px rgba(255,64,64,0)} 100%{box-shadow:0 0 0 0 rgba(255,64,64,0)} }
.live-label { font-size:11px; font-weight:600; letter-spacing:1px; color:rgba(255,255,255,.65); }
.live-time  { font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,.28); margin-left:2px; }

.section-label { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.18); padding-left:2px; }

.chat-box { flex:1; border-radius:14px; background:rgba(0,0,0,0.52); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.06); overflow:hidden; position:relative; }
.chat-box::before { content:''; position:absolute; top:0;left:0;right:0; height:36px; background:linear-gradient(to bottom,rgba(3,3,10,.7),transparent); z-index:10; pointer-events:none; border-radius:14px 14px 0 0; }
.chat-box iframe { width:100%; height:100%; border:none; }

.stats-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat { background:rgba(0,0,0,0.52); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.06); border-radius:10px; padding:10px 14px; }
.stat-val { font-family:'DM Mono',monospace; font-size:18px; font-weight:500; color:#fff; line-height:1; }
.stat-lbl { font-size:9px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,.25); margin-top:3px; }
</style>
</head>
<body>

<div id="space">
  <canvas id="c"></canvas>
  <div class="nebula n1"></div>
  <div class="nebula n2"></div>
  <div class="nebula n3"></div>
</div>

<div class="layout">
  <div class="cam-zone">
    <div class="cam-placeholder">webcam ici</div>
    <div class="cam-frame"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div class="right-col">
    <div class="live-badge">
      <div class="dot" id="dot"></div>
      <span class="live-label" id="liveLabel">OFFLINE</span>
      <span class="live-time" id="liveTime"></span>
    </div>

    <div class="section-label">Chat Twitch</div>
    <div class="chat-box">
      <iframe src="https://www.twitch.tv/embed/gregd95/chat?parent=valorantbot-production.up.railway.app&darkpopout" allowfullscreen></iframe>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-val" id="vVal">—</div>
        <div class="stat-lbl">Viewers</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="fVal">—</div>
        <div class="stat-lbl">Followers</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── ÉTOILES ────────────────────────────────────────────────
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
cv.width = 1920; cv.height = 1080;

const stars = Array.from({length:300}, () => ({
  x: Math.random()*1920, y: Math.random()*1080,
  r: Math.random()*1.5,
  a: 0.1+Math.random()*0.65,
  ts: 0.002+Math.random()*0.007,
  to: Math.random()*Math.PI*2,
}));

const shooting = [];

function spawnShooting() {
  const ang = (12+Math.random()*18)*Math.PI/180;
  shooting.push({
    x: Math.random()*1500, y: Math.random()*350,
    len: 100+Math.random()*200,
    speed: 9+Math.random()*12,
    alpha: 1, ang,
  });
}

setInterval(spawnShooting, 3000+Math.random()*2500);
setTimeout(spawnShooting, 800);
setTimeout(spawnShooting, 2200);

let tick = 0;
function frame() {
  cx.clearRect(0,0,1920,1080);
  tick += 0.016;

  stars.forEach(s => {
    const a = s.a*(0.55+0.45*Math.sin(tick*s.ts*60+s.to));
    cx.beginPath();
    cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle = `rgba(255,255,255,${a})`;
    cx.fill();
  });

  for (let i=shooting.length-1; i>=0; i--) {
    const s = shooting[i];
    const tx = s.x - Math.cos(s.ang)*s.len;
    const ty = s.y - Math.sin(s.ang)*s.len;
    const g = cx.createLinearGradient(tx,ty,s.x,s.y);
    g.addColorStop(0,'rgba(255,255,255,0)');
    g.addColorStop(0.6,`rgba(210,195,255,${s.alpha*0.35})`);
    g.addColorStop(1,`rgba(255,255,255,${s.alpha*0.85})`);
    cx.beginPath(); cx.moveTo(tx,ty); cx.lineTo(s.x,s.y);
    cx.strokeStyle=g; cx.lineWidth=1.5; cx.stroke();

    // Lueur tête
    const rg = cx.createRadialGradient(s.x,s.y,0,s.x,s.y,5);
    rg.addColorStop(0,`rgba(255,255,255,${s.alpha*0.7})`);
    rg.addColorStop(1,'rgba(255,255,255,0)');
    cx.beginPath(); cx.arc(s.x,s.y,5,0,Math.PI*2);
    cx.fillStyle=rg; cx.fill();

    s.x+=Math.cos(s.ang)*s.speed; s.y+=Math.sin(s.ang)*s.speed; s.alpha-=0.016;
    if(s.alpha<=0||s.x>1920||s.y>1080) shooting.splice(i,1);
  }
  requestAnimationFrame(frame);
}
frame();

// ── STREAM API ─────────────────────────────────────────────
const dot       = document.getElementById('dot');
const liveLabel = document.getElementById('liveLabel');
const liveTime  = document.getElementById('liveTime');
const vVal      = document.getElementById('vVal');
const fVal      = document.getElementById('fVal');

let start=null, timer=null;
function fmt(n){ return n>=1000?(n/1000).toFixed(1).replace('.0','')+'k':String(n); }

function tick2() {
  if(!start) return;
  const d=Math.floor((Date.now()-start)/1000);
  const h=Math.floor(d/3600),m=Math.floor((d%3600)/60),s=d%60;
  liveTime.textContent = h>0?`${h}h${String(m).padStart(2,'0')}m`:`${String(m).padStart(2,'0')}m${String(s).padStart(2,'0')}s`;
}

async function poll() {
  try {
    const r=await fetch('/api/stream'), d=await r.json();
    if(!r.ok) return;
    if(d.live){
      dot.className='dot live'; liveLabel.textContent='EN DIRECT';
      vVal.textContent=fmt(d.viewers); fVal.textContent=fmt(d.followers);
      start=new Date(d.started_at);
      if(!timer) timer=setInterval(tick2,1000);
      tick2();
    } else {
      dot.className='dot'; liveLabel.textContent='OFFLINE'; liveTime.textContent='';
      vVal.textContent='0'; start=null;
      if(timer){clearInterval(timer);timer=null;}
    }
    fVal.textContent=fmt(d.followers);
  } catch(e){}
}
poll(); setInterval(poll,20000);
</script>
</body>
</html>
