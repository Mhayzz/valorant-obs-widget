<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:transparent; width:300px; overflow:hidden; font-family:'DM Sans',sans-serif; }

.container {
  display:flex; flex-direction:column; gap:5px; padding:2px;
  opacity:0; transform:translateY(6px);
  transition:opacity .5s ease,transform .5s ease;
}
.container.show { opacity:1; transform:translateY(0); }

.card {
  border-radius:10px;
  background:var(--card-bg,rgba(0,0,0,0.75));
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.07);
  overflow:hidden;
}

/* RANK */
.rank-card { display:flex; align-items:center; gap:10px; padding:10px 14px 10px 10px; height:70px; }
.rank-icon { flex-shrink:0; width:46px; height:46px; display:flex; align-items:center; justify-content:center; }
.rank-icon img { width:46px; height:46px; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(0,0,0,.6)); }
.rank-info { flex:1; display:flex; flex-direction:column; gap:4px; }
.rank-name { font-weight:600; font-size:16px; color:#fff; line-height:1; }
.rr-row { display:flex; align-items:center; gap:6px; }
.rr-label { font-family:'DM Mono',monospace; font-size:11px; color:rgba(255,255,255,.35); min-width:34px; }
.track { flex:1; height:2px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; }
.fill { height:100%; border-radius:2px; background:rgba(255,255,255,.4); transition:width 1.2s cubic-bezier(.4,0,.2,1); }
.rr-badge { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; min-width:36px; text-align:right; line-height:1; flex-shrink:0; }
.rr-badge .sub { display:block; font-size:8px; letter-spacing:1px; opacity:.35; margin-top:2px; text-align:right; font-family:'DM Sans',sans-serif; }
.rr-badge.pos { color:#5fffb5; } .rr-badge.neg { color:#ff5060; } .rr-badge.neu { color:rgba(255,255,255,.2); }
.rr-badge.pop { animation:pop .35s ease; }

/* STREAM */
.stream-card { padding:10px 14px; display:flex; flex-direction:column; gap:8px; }
.stream-top { display:flex; align-items:center; gap:8px; }
.live-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; background:rgba(255,255,255,.2); }
.live-dot.live { background:#ff4040; animation:pulse-dot 1.8s ease infinite; }
@keyframes pulse-dot {
  0%   { box-shadow:0 0 0 0 rgba(255,64,64,.4); }
  70%  { box-shadow:0 0 0 5px rgba(255,64,64,0); }
  100% { box-shadow:0 0 0 0 rgba(255,64,64,0); }
}
.stream-left { flex:1; }
.stream-status { font-size:11px; font-weight:600; color:rgba(255,255,255,.9); line-height:1; letter-spacing:.3px; }
.stream-timer { font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,.32); margin-top:2px; }
.viewers-wrap { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.viewers-num { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:rgba(255,255,255,.8); }
.icon-small { font-size:11px; opacity:.4; }
.stats-row { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.stat-box { background:rgba(255,255,255,.04); border-radius:6px; padding:6px 8px; display:flex; flex-direction:column; gap:2px; }
.stat-val { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:#fff; line-height:1; }
.stat-lbl { font-size:9px; font-weight:500; letter-spacing:.8px; color:rgba(255,255,255,.3); text-transform:uppercase; }
.last-follow { display:flex; align-items:center; gap:6px; padding:6px 10px; background:rgba(255,255,255,.03); border-radius:6px; }
.last-follow-icon { font-size:11px; opacity:.35; }
.last-follow-text { font-size:11px; color:rgba(255,255,255,.4); flex-shrink:0; }
.last-follow-name { font-size:11px; font-weight:600; color:rgba(255,255,255,.75); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.auth-warn { font-size:10px; color:rgba(255,160,0,.6); text-align:center; padding:2px 0; }

.stat-val.updated { animation:flash-val .4s ease; }
@keyframes flash-val { 0% { opacity:.3; } 100% { opacity:1; } }
@keyframes pop {
  0%   { transform:scale(.8); opacity:0; }
  60%  { transform:scale(1.1); }
  100% { transform:scale(1); opacity:1; }
}
</style>
</head>
<body>
<div class="container" id="container">
  <div class="card rank-card">
    <div class="rank-icon"><img id="ico" src="" alt="" style="display:none"></div>
    <div class="rank-info">
      <div class="rank-name" id="rankName">—</div>
      <div class="rr-row">
        <div class="rr-label" id="rrLabel">0 RR</div>
        <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="rr-badge neu" id="badge"><span id="badgeNum">—</span><span class="sub">LAST</span></div>
  </div>

  <div class="card stream-card">
    <div class="stream-top">
      <div class="live-dot" id="liveDot"></div>
      <div class="stream-left">
        <div class="stream-status" id="streamStatus">Offline</div>
        <div class="stream-timer" id="streamTimer">—</div>
      </div>
      <div class="viewers-wrap">
        <span class="icon-small">👁</span>
        <span class="viewers-num" id="viewersNum">0</span>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="followersVal">—</div><div class="stat-lbl">Followers</div></div>
      <div class="stat-box"><div class="stat-val" id="subsVal">—</div><div class="stat-lbl">Subs</div></div>
    </div>
    <div class="last-follow">
      <span class="last-follow-icon">❤️</span>
      <span class="last-follow-text">Dernier follow :</span>
      <span class="last-follow-name" id="lastFollowName">—</span>
    </div>
    <div class="auth-warn" id="authWarn" style="display:none">
      ⚠️ Subs: <a href="/auth" style="color:rgba(255,160,0,.8)" target="_blank">Autoriser ici</a>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const op = parseFloat(params.get('opacity'));
if (!isNaN(op)) document.documentElement.style.setProperty('--card-bg', `rgba(0,0,0,${Math.min(1,Math.max(0,op))})`);

const container = document.getElementById('container');
const ico = document.getElementById('ico');
const rankName = document.getElementById('rankName');
const rrLabel = document.getElementById('rrLabel');
const fill = document.getElementById('fill');
const badge = document.getElementById('badge');
const badgeNum = document.getElementById('badgeNum');
const liveDot = document.getElementById('liveDot');
const streamStatus = document.getElementById('streamStatus');
const streamTimer = document.getElementById('streamTimer');
const viewersNum = document.getElementById('viewersNum');
const followersVal = document.getElementById('followersVal');
const subsVal = document.getElementById('subsVal');
const lastFollowName = document.getElementById('lastFollowName');
const authWarn = document.getElementById('authWarn');

let prevChange = undefined, firstLoad = true, streamStart = null, timerInterval = null;

function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1).replace('.0','')+'k' : String(n); }
function animVal(el, val) { el.textContent = val; el.classList.remove('updated'); void el.offsetWidth; el.classList.add('updated'); }

async function refreshRank() {
  try {
    const res = await fetch('/api/rank');
    const d = await res.json();
    if (!res.ok) return;
    rankName.textContent = d.rank;
    rrLabel.textContent = d.rr + ' RR';
    fill.style.width = Math.min(100, Math.max(0, d.rr)) + '%';
    if (d.tier > 0) {
      ico.style.display = 'block';
      ico.src = d.rank_icon;
      ico.onerror = () => { ico.src = `https://media.valorant-api.com/competitivetiers/564d8e28-c226-3180-6285-e48a390db8b1/${d.tier}/largeicon.png`; };
    }
    const chg = d.rr_change;
    badge.className = 'rr-badge ' + (chg === null ? 'neu' : chg > 0 ? 'pos' : chg < 0 ? 'neg' : 'neu');
    badgeNum.textContent = chg === null ? '—' : (chg > 0 ? '+' : '') + chg;
    if (prevChange !== undefined && prevChange !== chg) { badge.classList.add('pop'); setTimeout(() => badge.classList.remove('pop'), 400); }
    prevChange = chg;
    if (firstLoad) { setTimeout(() => container.classList.add('show'), 80); firstLoad = false; }
  } catch(e) {}
}

async function refreshStream() {
  try {
    const res = await fetch('/api/stream');
    const d = await res.json();
    if (!res.ok) return;
    if (d.live) {
      liveDot.className = 'live-dot live';
      streamStatus.textContent = 'EN DIRECT';
      viewersNum.textContent = fmt(d.viewers);
      streamStart = new Date(d.started_at);
      if (!timerInterval) timerInterval = setInterval(updateTimer, 1000);
      updateTimer();
    } else {
      liveDot.className = 'live-dot';
      streamStatus.textContent = 'Offline';
      streamTimer.textContent = '—';
      viewersNum.textContent = '0';
      streamStart = null;
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }
    animVal(followersVal, d.followers >= 0 ? fmt(d.followers) : '—');
    if (d.subs !== null && d.subs !== undefined) { animVal(subsVal, fmt(d.subs)); authWarn.style.display = 'none'; }
    else { subsVal.textContent = '—'; authWarn.style.display = d.auth_needed ? 'block' : 'none'; }
    lastFollowName.textContent = d.last_follower || '—';
  } catch(e) {}
}

function updateTimer() {
  if (!streamStart) return;
  const diff = Math.floor((Date.now() - streamStart) / 1000);
  const h = Math.floor(diff / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
  streamTimer.textContent = h > 0 ? `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s` : `${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

refreshRank();
refreshStream();
setInterval(refreshRank, 30000);
setInterval(refreshStream, 20000);
</script>
</body>
</html>
