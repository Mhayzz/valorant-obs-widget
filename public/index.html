<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Valo Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --accent: #ffffff;
  --card-bg: rgba(0,0,0,0.75);
  --text-primary: #ffffff;
  --text-secondary: rgba(255,255,255,0.6);
  --text-tertiary: rgba(255,255,255,0.3);
  --w: 300px;
  --radius: 10px;
}

body {
  background:transparent;
  width:var(--w);
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
}

/* OBS background - TRANSPARENT */
body.obs-mode { background: transparent; }

/* Fade-in animation for smooth scene transitions */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.container {
  display:flex; flex-direction:column; gap:5px; padding:2px;
  opacity:0; transform:translateY(6px);
}
.container.show {
  opacity:1; transform:translateY(0);
  animation: fadeInUp 0.8s ease-out;
  transition:opacity .3s ease, transform .3s ease;
}

.card {
  border-radius:var(--radius);
  background:var(--card-bg);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.07);
  overflow:hidden;
}

/* OBS mode: keep styling but use darker background for visibility */
body.obs-mode .card {
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  background:var(--card-bg);
  border:1px solid rgba(255,255,255,0.1);
}


/* ── Rank card ───────────────────────────────────────── */
.rank-card {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px 10px 10px;
}
.rank-icon {
  flex-shrink:0; width:46px; height:46px;
  display:flex; align-items:center; justify-content:center;
}
.rank-icon img {
  width:46px; height:46px; object-fit:contain;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.6));
}
.rank-info { flex:1; display:flex; flex-direction:column; gap:4px; }
.rank-name { font-weight:600; font-size:16px; color:#fff; line-height:1; display:flex; align-items:center; gap:6px; width:100%; }
.rank-name .peak-inline { display:none; font-size:9px; font-weight:600; letter-spacing:.7px; text-transform:uppercase; color:var(--text-tertiary); align-items:center; gap:3px; }
.rank-name .peak-inline.align-left { margin-left:8px; }
.rank-name .peak-inline.align-right { margin-left:auto; }
.rank-name .peak-inline img { width:20px; height:20px; vertical-align:middle; }

.peak-rank {
  font-size:9px; font-weight:600; letter-spacing:.7px;
  text-transform:uppercase; color:var(--text-tertiary);
  line-height:1; margin-top:1px;
}
.peak-rank span { color:rgba(255,255,255,.45); font-family:'DM Mono',monospace; }
.peak-icon { width:22px; height:22px; vertical-align:middle; margin-left:4px; }

/* ── RR Chart ───────────────────────────────────────────── */
.rr-chart-card {
  display:flex; flex-direction:column; gap:6px;
  padding:8px 14px;
}
.rr-chart-label {
  font-size:8px; font-weight:600; letter-spacing:.5px;
  text-transform:uppercase; color:var(--text-secondary);
}
#rrChart { height:40px; }

.rr-row { display:flex; align-items:center; gap:6px; }
.rr-label {
  font-family:'DM Mono',monospace; font-size:11px;
  color:var(--text-tertiary); min-width:34px;
}
.track { flex:1; height:2px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; }
.fill {
  height:100%; border-radius:2px;
  background:var(--accent);
  opacity:.6;
  transition:width 0.2s linear;
  will-change:width;
}

.rr-badge {
  font-family:'DM Mono',monospace; font-size:13px; font-weight:500;
  min-width:36px; text-align:right; line-height:1; flex-shrink:0;
}
.rr-badge .sub {
  display:block; font-size:8px; letter-spacing:1px;
  opacity:.35; margin-top:2px; text-align:right;
  font-family:'DM Sans',sans-serif;
}
.rr-badge.pos { color:#5fffb5; }
.rr-badge.neg { color:#ff5060; }
.rr-badge.neu { color:rgba(255,255,255,.2); }
/* ── Match card ──────────────────────────────────────── */
.match-card {
  display:flex; align-items:center; gap:9px;
  padding:7px 14px 7px 10px;
}
.match-agent-wrap {
  flex-shrink:0; width:30px; height:30px; border-radius:7px;
  overflow:hidden; background:rgba(255,255,255,.06);
  display:flex; align-items:center; justify-content:center;
}
.match-agent-wrap img { width:30px; height:30px; object-fit:cover; }
.match-info { flex:1; min-width:0; }
.match-agent-name { font-size:12px; font-weight:600; color:var(--text-secondary); line-height:1; }
.match-kda-map {
  font-family:'DM Mono',monospace; font-size:9px;
  color:var(--text-tertiary); margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.match-result {
  font-size:10px; font-weight:700; letter-spacing:.8px;
  padding:3px 8px; border-radius:5px; flex-shrink:0;
}
.match-result.win  { color:#5fffb5; background:rgba(95,255,181,.1); }
.match-result.loss { color:#ff5060; background:rgba(255,80,96,.1); }
.match-result.draw { color:rgba(255,255,255,.3); background:rgba(255,255,255,.05); }

/* ── Streak card ─────────────────────────────────────── */
.streak-card {
  display:flex; align-items:center;
  padding:8px 14px; gap:5px;
}
.streak-label {
  font-size:9px; font-weight:600; letter-spacing:1px;
  text-transform:uppercase; color:var(--text-secondary);
  margin-right:4px; flex-shrink:0;
}
.streak-dots { display:flex; gap:4px; align-items:center; }
.s-dot {
  width:22px; height:5px; border-radius:3px;
  transition: background .3s;
}
.s-dot.win  { background:#5fffb5; opacity:.75; }
.s-dot.loss { background:#ff5060; opacity:.75; }
.s-dot.draw { background:rgba(255,255,255,.2); }
.s-dot.empty { background:rgba(255,255,255,.07); }
.win-rate {
  font-size:9px; color:var(--text-tertiary); margin-left:auto;
  font-family:'DM Mono',monospace; flex-shrink:0;
}

/* ── Animation variants ──────────────────────────────── */
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}
@keyframes slideIn {
  from { opacity:0; transform:translateX(-5px); }
  to { opacity:1; transform:translateX(0); }
}
body.fade-anim .rank-card,
body.fade-anim .match-card,
body.fade-anim .streak-card { animation:fadeIn 0.3s ease-out; }
body.slide-anim .rank-card,
body.slide-anim .match-card,
body.slide-anim .streak-card { animation:slideIn 0.3s ease-out; }

/* ── Layout Presets ──────────────────────────────────── */
/* All preset layouts override --w and body width via !important
   so the widget_width setting doesn't conflict with preset sizing */

/* COMPACT - tight vertical stack, smaller elements */
body.layout-compact { --w: 220px !important; width: 220px !important; }
body.layout-compact .container { gap: 3px; }
body.layout-compact .rank-card { padding: 6px 10px 6px 6px; gap: 7px; }
body.layout-compact .rank-icon,
body.layout-compact .rank-icon img { width: 32px; height: 32px; }
body.layout-compact .rank-name { font-size: 13px; }
body.layout-compact .rr-label { font-size: 10px; min-width: 28px; }
body.layout-compact .rr-badge { font-size: 11px; min-width: 28px; }
body.layout-compact .match-card { padding: 5px 10px 5px 6px; gap: 6px; }
body.layout-compact .match-agent-wrap,
body.layout-compact .match-agent-wrap img { width: 24px; height: 24px; }
body.layout-compact .match-agent-name { font-size: 11px; }
body.layout-compact .match-kda-map { font-size: 8px; }
body.layout-compact .match-result { font-size: 9px; padding: 2px 6px; }
body.layout-compact .streak-card { padding: 4px 10px; }
body.layout-compact .s-dot { width: 16px; height: 4px; }
body.layout-compact .rr-chart-card { padding: 6px 10px; }
body.layout-compact #rrChart { height: 32px; }

/* SPLIT - rank card on left (spans vertically), stats stack on right */
body.layout-split { --w: 440px !important; width: 440px !important; }
body.layout-split .container {
  display: grid;
  grid-template-columns: 210px 1fr;
  grid-template-areas:
    "rank  match"
    "rank  streak"
    "chart chart";
  gap: 4px;
}
body.layout-split .rank-card { grid-area: rank; align-self: stretch; }
body.layout-split .match-card { grid-area: match; padding: 8px 12px 8px 8px; }
body.layout-split .streak-card { grid-area: streak; padding: 6px 12px; }
body.layout-split .rr-chart-card { grid-area: chart; }
body.layout-split .match-kda-map { white-space: normal; }
body.layout-split .s-dot { width: 16px; }

/* ROW - everything in a single horizontal row (chart on second line) */
body.layout-row { --w: 780px !important; width: 780px !important; }
body.layout-row .container {
  display: grid;
  grid-template-columns: 250px 220px 1fr;
  grid-template-areas:
    "rank  match streak"
    "chart chart chart";
  gap: 4px;
}
body.layout-row .rank-card { grid-area: rank; }
body.layout-row .match-card { grid-area: match; padding: 7px 10px 7px 8px; }
body.layout-row .streak-card { grid-area: streak; padding: 8px 12px; }
body.layout-row .rr-chart-card { grid-area: chart; }
body.layout-row .match-kda-map { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
body.layout-row .s-dot { width: 16px; height: 4px; }
body.layout-row .streak-dots { gap: 3px; }

/* GRID - 2x2 arrangement: rank+match top, streak wide, chart wide */
body.layout-grid { --w: 400px !important; width: 400px !important; }
body.layout-grid .container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-areas:
    "rank  match"
    "streak streak"
    "chart chart";
  gap: 4px;
}
body.layout-grid .rank-card { grid-area: rank; padding: 8px 10px 8px 6px; gap: 6px; }
body.layout-grid .rank-icon,
body.layout-grid .rank-icon img { width: 36px; height: 36px; }
body.layout-grid .rank-name { font-size: 13px; }
body.layout-grid .match-card { grid-area: match; padding: 6px 8px 6px 6px; }
body.layout-grid .match-agent-wrap,
body.layout-grid .match-agent-wrap img { width: 26px; height: 26px; }
body.layout-grid .match-agent-name { font-size: 11px; }
body.layout-grid .match-kda-map { font-size: 8px; }
body.layout-grid .streak-card { grid-area: streak; }
body.layout-grid .rr-chart-card { grid-area: chart; }

/* MINIMAL - only the rank card, nothing else, tight */
body.layout-minimal { --w: 260px !important; width: 260px !important; }
body.layout-minimal .match-card,
body.layout-minimal .streak-card,
body.layout-minimal .rr-chart-card { display: none !important; }
body.layout-minimal .rank-card { padding: 8px 12px 8px 8px; }

/* TALL - very narrow, for side-of-stream placement (icons focused) */
body.layout-tall { --w: 160px !important; width: 160px !important; }
body.layout-tall .container { gap: 3px; }
body.layout-tall .rank-card { padding: 6px 8px 6px 6px; gap: 6px; }
body.layout-tall .rank-icon,
body.layout-tall .rank-icon img { width: 28px; height: 28px; }
body.layout-tall .rank-name { font-size: 11px; }
body.layout-tall .rr-label { font-size: 9px; min-width: 26px; }
body.layout-tall .rr-badge { font-size: 10px; min-width: 24px; }
body.layout-tall .rr-badge .sub { font-size: 7px; }
body.layout-tall .match-card { padding: 4px 8px; flex-wrap: wrap; gap: 5px; }
body.layout-tall .match-agent-wrap,
body.layout-tall .match-agent-wrap img { width: 22px; height: 22px; }
body.layout-tall .match-agent-name { font-size: 10px; }
body.layout-tall .match-kda-map { font-size: 7px; white-space: normal; }
body.layout-tall .match-result { font-size: 8px; padding: 2px 5px; }
body.layout-tall .streak-card { padding: 4px 6px; flex-wrap: wrap; gap: 3px; }
body.layout-tall .streak-label { font-size: 7px; }
body.layout-tall .s-dot { width: 10px; height: 3px; }
body.layout-tall .win-rate { font-size: 7px; }
body.layout-tall .rr-chart-card { padding: 5px 6px; }
body.layout-tall .rr-chart-label { font-size: 7px; }
body.layout-tall #rrChart { height: 28px; }

/* ── Loading ─────────────────────────────────────────── */
.loading-msg {
  padding:16px;
  text-align:center;
  font-size:12px;
  font-weight:500;
  color:rgba(255,255,255,.4);
  letter-spacing:.5px;
}
.loading-msg.hidden { display:none; }
.overlay-content.hidden { display:none; }

/* ── Rank animations ─────────────────────────────────────── */
@keyframes rank-glow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card.rank-card.animate-rankup,
.card.rank-card.animate-win {
  position: relative;
  background: linear-gradient(90deg, rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
              linear-gradient(135deg, #5fffb5, rgba(95, 255, 181, 0.3), #5fffb5);
  background-size: 100% 100%, 200% 200%;
  animation: rank-glow 0.8s ease-in-out;
  border: 2px solid #5fffb5;
  box-shadow: 0 0 30px rgba(95, 255, 181, 0.6), inset 0 0 30px rgba(95, 255, 181, 0.2);
}

.card.rank-card.animate-rankdown,
.card.rank-card.animate-lose {
  position: relative;
  background: linear-gradient(90deg, rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
              linear-gradient(135deg, #ff5060, rgba(255, 80, 96, 0.3), #ff5060);
  background-size: 100% 100%, 200% 200%;
  animation: rank-glow 0.8s ease-in-out;
  border: 2px solid #ff5060;
  box-shadow: 0 0 30px rgba(255, 80, 96, 0.6), inset 0 0 30px rgba(255, 80, 96, 0.2);
}
</style>
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="container" id="container">
  <!-- Loading message -->
  <div class="card loading-msg" id="loadingMsg">Chargement des données...</div>
  <!-- Rank -->
  <div class="card rank-card overlay-content hidden">
    <div class="rank-icon">
      <img id="ico" src="" alt="" style="display:none">
    </div>
    <div class="rank-info">
      <div class="rank-name"><span id="rankName">—</span><span class="peak-inline" id="peakInline"></span></div>
      <div class="peak-rank" id="peakRank" style="display:none"></div>
      <div class="rr-row">
        <div class="rr-label" id="rrLabel">0 RR</div>
        <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="rr-badge neu" id="badge">
      <span id="badgeNum">—</span>
      <span class="sub">LAST</span>
    </div>
  </div>

  <!-- Last match -->
  <div class="card match-card overlay-content hidden" id="matchCard" style="display:none">
    <div class="match-agent-wrap">
      <img id="matchIcon" src="" alt="" style="display:none">
    </div>
    <div class="match-info">
      <div class="match-agent-name" id="matchAgent">—</div>
      <div class="match-kda-map" id="matchKda">—</div>
    </div>
    <div class="match-result draw" id="matchResult">?</div>
  </div>

  <!-- Streak -->
  <div class="card streak-card overlay-content hidden" id="streakCard" style="display:none">
    <span class="streak-label">STREAK</span>
    <div class="streak-dots" id="streakDots"></div>
    <span class="win-rate" id="winRate"></span>
  </div>

  <!-- RR History Chart -->
  <div class="card rr-chart-card overlay-content hidden" id="rrChartCard" style="display:none">
    <span class="rr-chart-label">RR AUJOURD'HUI</span>
    <div id="rrChart"></div>
  </div>
</div>

<script src="/js/valo-constants.js"></script>
<script src="/js/overlay.js"></script>
</body>
</html>
