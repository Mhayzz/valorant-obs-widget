<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: transparent;
  width: 300px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 2px;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .5s ease, transform .5s ease;
}
.container.show { opacity:1; transform:translateY(0); }

/* Bloc commun */
.card {
  position: relative;
  border-radius: 10px;
  background: rgba(0,0,0,0.52);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.07);
  overflow: hidden;
}

/* ── RANK CARD ── */
.rank-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px 10px 10px;
  height: 72px;
}

.rank-icon {
  flex-shrink: 0;
  width: 48px; height: 48px;
  display: flex; align-items:center; justify-content:center;
}
.rank-icon img {
  width: 48px; height: 48px;
  object-fit: contain;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.6));
}

.rank-info { flex:1; display:flex; flex-direction:column; gap:4px; }

.rank-name {
  font-weight: 600;
  font-size: 17px;
  color: #fff;
  line-height: 1;
}

.rr-row {
  display: flex; align-items:center; gap:6px;
}
.rr-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,.38);
  min-width: 34px;
}
.track {
  flex:1; height:2px;
  background: rgba(255,255,255,.1);
  border-radius: 2px; overflow:hidden;
}
.fill {
  height:100%; border-radius:2px;
  background: rgba(255,255,255,.42);
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
}

.rr-badge {
  font-family: 'DM Mono', monospace;
  font-size: 14px; font-weight: 500;
  min-width: 38px; text-align:right;
  line-height: 1;
}
.rr-badge .sub {
  display:block; font-size:8px;
  letter-spacing:1px; opacity:.38;
  margin-top:2px; text-align:right;
  font-family:'DM Sans',sans-serif;
}
.rr-badge.pos { color:#5fffb5; }
.rr-badge.neg { color:#ff5060; }
.rr-badge.neu { color:rgba(255,255,255,.22); }
.rr-badge.pop { animation: pop .35s ease; }

/* ── STREAM CARD ── */
.stream-card {
  display: flex;
  align-items: center;
  padding: 9px 14px;
  gap: 0;
  height: 44px;
}

/* Dot live */
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #ff4040;
  margin-right: 8px;
  flex-shrink: 0;
  box-shadow: 0 0 0 0 rgba(255,64,64,.5);
}
.live-dot.live { animation: pulse-dot 1.8s ease infinite; }
.live-dot.offline { background: rgba(255,255,255,.2); }

@keyframes pulse-dot {
  0%   { box-shadow: 0 0 0 0 rgba(255,64,64,.5); }
  70%  { box-shadow: 0 0 0 5px rgba(255,64,64,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,64,64,0); }
}

.stream-info { flex:1; display:flex; flex-direction:column; gap:2px; }

.stream-status {
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,.9);
  line-height: 1;
}

.stream-timer {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,.35);
}

.divider {
  width: 1px; height: 24px;
  background: rgba(255,255,255,.08);
  margin: 0 12px;
  flex-shrink: 0;
}

.viewers {
  display: flex; align-items:center; gap:5px;
  flex-shrink: 0;
}
.viewers-num {
  font-family: 'DM Mono', monospace;
  font-size: 14px; font-weight: 500;
  color: rgba(255,255,255,.85);
}
.viewers-icon {
  font-size: 12px;
  opacity: .45;
}

@keyframes pop {
  0%   { transform:scale(.8); opacity:0; }
  60%  { transform:scale(1.1); }
  100% { transform:scale(1); opacity:1; }
}
</style>
</head>
<body>

<div class="container" id="container">

  <!-- Rank -->
  <div class="card rank-card">
    <div class="rank-icon">
      <img id="ico" src="" alt="" style="display:none">
    </div>
    <div class="rank-info">
      <div class="rank-name" id="rankName">—</div>
      <div class="rr-row">
        <div class="rr-label" id="rrLabel">0 RR</div>
        <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="rr-badge neu" id="badge">
      <span id="badgeNum">—</span>
      <span class="sub">LAST</span>
    </div>
  </div>

  <!-- Stream -->
  <div class="card stream-card">
    <div class="live-dot offline" id="liveDot"></div>
    <div class="stream-info">
      <div class="stream-status" id="streamStatus">Offline</div>
      <div class="stream-timer" id="streamTimer">—</div>
    </div>
    <div class="divider"></div>
    <div class="viewers">
      <span class="viewers-icon">👁</span>
      <span class="viewers-num" id="viewersNum">0</span>
    </div>
  </div>

</div>

<script>
const container    = document.getElementById('container');
const ico          = document.getElementById('ico');
const rankName     = document.getElementById('rankName');
const rrLabel      = document.getElementById('rrLabel');
const fill         = document.getElementById('fill');
const badge        = document.getElementById('badge');
const badgeNum     = document.getElementById('badgeNum');
const liveDot      = document.getElementById('liveDot');
const streamStatus = document.getElementById('streamStatus');
const streamTimer  = document.getElementById('streamTimer');
const viewersNum   = document.getElementById('viewersNum');

let prevChange = undefined;
let firstLoad  = true;
let streamStart = null;
let timerInterval = null;

// ── Rank ──────────────────────────────────────────────────
async function refreshRank() {
  try {
    const res  = await fetch('/api/rank');
    const data = await res.json();
    if (res.ok) renderRank(data);
  } catch(e) {}
}

function renderRank(d) {
  rankName.textContent = d.rank;
  rrLabel.textContent  = d.rr + ' RR';
  fill.style.width     = Math.min(100, Math.max(0, d.rr)) + '%';

  if (d.tier > 0) {
    ico.style.display = 'block';
    ico.src = d.rank_icon;
    ico.onerror = () => {
      ico.src = `https://media.valorant-api.com/competitivetiers/564d8e28-c226-3180-6285-e48a390db8b1/${d.tier}/largeicon.png`;
    };
  }

  const chg = d.rr_change;
  badge.className = 'rr-badge ' + (chg === null ? 'neu' : chg > 0 ? 'pos' : chg < 0 ? 'neg' : 'neu');
  badgeNum.textContent = chg === null ? '—' : (chg > 0 ? '+' : '') + chg;

  if (prevChange !== undefined && prevChange !== chg) {
    badge.classList.add('pop');
    setTimeout(() => badge.classList.remove('pop'), 400);
  }
  prevChange = chg;

  if (firstLoad) {
    setTimeout(() => container.classList.add('show'), 80);
    firstLoad = false;
  }
}

// ── Stream ─────────────────────────────────────────────────
async function refreshStream() {
  try {
    const res  = await fetch('/api/stream');
    const data = await res.json();
    if (res.ok) renderStream(data);
  } catch(e) {}
}

function renderStream(d) {
  if (d.live) {
    liveDot.className = 'live-dot live';
    streamStatus.textContent = 'EN DIRECT';
    viewersNum.textContent = d.viewers.toLocaleString('fr-FR');
    streamStart = new Date(d.started_at);
    if (!timerInterval) timerInterval = setInterval(updateTimer, 1000);
    updateTimer();
  } else {
    liveDot.className = 'live-dot offline';
    streamStatus.textContent = 'Offline';
    streamTimer.textContent = '—';
    viewersNum.textContent = '0';
    streamStart = null;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }
}

function updateTimer() {
  if (!streamStart) return;
  const diff = Math.floor((Date.now() - streamStart) / 1000);
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  streamTimer.textContent = h > 0
    ? `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`
    : `${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

// ── Init ───────────────────────────────────────────────────
refreshRank();
refreshStream();
setInterval(refreshRank,  30000);
setInterval(refreshStream, 20000);
</script>
</body>
</html>
