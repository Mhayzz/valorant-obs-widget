<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Valo Rank</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: transparent;
  width: 280px;
  height: 80px;
  overflow: hidden;
}

.widget {
  width: 280px;
  height: 80px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 14px 0 10px;
  position: relative;
  opacity: 0;
  transform: translateX(-10px);
  transition: opacity .5s ease, transform .5s ease;
}
.widget.show { opacity:1; transform:translateX(0); }

.widget::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
}

.icon {
  position: relative; z-index:1;
  flex-shrink: 0;
  width: 52px; height: 52px;
  display: flex; align-items:center; justify-content:center;
}
.icon img {
  width: 52px; height: 52px;
  object-fit: contain;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
}

.info {
  position: relative; z-index:1;
  flex: 1;
  display: flex; flex-direction:column; gap:4px;
}

.rank-name {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 18px;
  color: #ffffff;
  letter-spacing: 0.3px;
  line-height: 1;
}

.rr-row {
  display: flex; align-items:center; gap:6px;
}

.rr-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.4);
  min-width: 36px;
}

.track {
  flex:1; height:2px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px; overflow:hidden;
}
.fill {
  height:100%; border-radius:2px;
  background: rgba(255,255,255,0.45);
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
}

.badge {
  position: relative; z-index:1;
  flex-shrink: 0;
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  min-width: 42px;
  text-align: right;
}
.badge.pos { color: #5fffb5; }
.badge.neg { color: #ff5060; }
.badge.neu { color: rgba(255,255,255,.25); }

.badge .lbl {
  display: block;
  font-size: 9px;
  letter-spacing: 1px;
  opacity: .4;
  margin-top: 3px;
  font-family: 'DM Sans', sans-serif;
}

.badge.pop { animation: pop .35s ease; }
@keyframes pop {
  0%   { transform: scale(.8); opacity:0; }
  60%  { transform: scale(1.1); }
  100% { transform: scale(1); opacity:1; }
}
</style>
</head>
<body>

<div class="widget" id="w">
  <div class="icon">
    <img id="ico" src="" alt="" style="display:none">
  </div>
  <div class="info">
    <div class="rank-name" id="rankName">—</div>
    <div class="rr-row">
      <div class="rr-num" id="rrNum">0 RR</div>
      <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="badge neu" id="badge">
    <span id="badgeNum">—</span>
    <span class="lbl">LAST</span>
  </div>
</div>

<script>
const w        = document.getElementById('w');
const ico      = document.getElementById('ico');
const rankName = document.getElementById('rankName');
const rrNum    = document.getElementById('rrNum');
const fill     = document.getElementById('fill');
const badge    = document.getElementById('badge');
const badgeNum = document.getElementById('badgeNum');

let prevChange = undefined;
let firstLoad  = true;

async function refresh() {
  try {
    const res  = await fetch('/api/rank');
    const data = await res.json();
    if (!res.ok) { showErr(data.error); return; }
    render(data);
  } catch(e) { showErr('…'); }
}

function render(d) {
  rankName.textContent = d.rank;
  rrNum.textContent    = d.rr + ' RR';
  fill.style.width     = Math.min(100, Math.max(0, d.rr)) + '%';

  if (d.tier > 0) {
    ico.style.display = 'block';
    ico.src = d.rank_icon;
    ico.onerror = () => {
      ico.src = `https://media.valorant-api.com/competitivetiers/564d8e28-c226-3180-6285-e48a390db8b1/${d.tier}/largeicon.png`;
    };
  }

  const chg = d.rr_change;
  badge.className = 'badge ' + (chg === null ? 'neu' : chg > 0 ? 'pos' : chg < 0 ? 'neg' : 'neu');
  badgeNum.textContent = chg === null ? '—' : (chg > 0 ? '+' : '') + chg;

  if (prevChange !== undefined && prevChange !== chg) {
    badge.classList.add('pop');
    setTimeout(() => badge.classList.remove('pop'), 400);
  }
  prevChange = chg;

  if (firstLoad) {
    setTimeout(() => w.classList.add('show'), 80);
    firstLoad = false;
  }
}

function showErr(msg) {
  rankName.textContent = 'Erreur';
  if (firstLoad) { setTimeout(() => w.classList.add('show'), 80); firstLoad = false; }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
