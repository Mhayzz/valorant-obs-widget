<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Valo Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --accent: #ff4655;
  --card-bg: rgba(0,0,0,0.75);
  --text-primary: #ffffff;
  --text-secondary: rgba(255,255,255,0.6);
  --text-tertiary: rgba(255,255,255,0.3);
  --w: 300px;
}

body {
  background:transparent;
  width:var(--w);
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
}

.container {
  display:flex; flex-direction:column; gap:5px; padding:2px;
  opacity:0; transform:translateY(6px);
  transition:opacity .5s ease, transform .5s ease;
}
.container.show { opacity:1; transform:translateY(0); }

.card {
  border-radius:10px;
  background:var(--card-bg);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.07);
  overflow:hidden;
}

/* ── Rank card ───────────────────────────────────────── */
.rank-card {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px 10px 10px;
}
.rank-icon {
  flex-shrink:0; width:46px; height:46px;
  display:flex; align-items:center; justify-content:center;
}
.rank-icon img {
  width:46px; height:46px; object-fit:contain;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.6));
}
.rank-info { flex:1; display:flex; flex-direction:column; gap:4px; }
.rank-name { font-weight:600; font-size:16px; color:#fff; line-height:1; }

.peak-rank {
  font-size:9px; font-weight:600; letter-spacing:.7px;
  text-transform:uppercase; color:var(--text-tertiary);
  line-height:1; margin-top:1px;
}
.peak-rank span { color:rgba(255,255,255,.45); font-family:'DM Mono',monospace; }
.peak-icon { width:16px; height:16px; vertical-align:middle; margin-left:4px; }

.session-rr {
  font-size:9px; font-weight:600; letter-spacing:.7px;
  text-transform:uppercase; color:var(--text-tertiary);
  line-height:1; margin-top:1px;
}
.session-rr .val { font-family:'DM Mono',monospace; }
.session-rr .pos { color:rgba(95,255,181,.8); }
.session-rr .neg { color:rgba(255,80,96,.8); }

.rr-row { display:flex; align-items:center; gap:6px; }
.rr-label {
  font-family:'DM Mono',monospace; font-size:11px;
  color:var(--text-tertiary); min-width:34px;
}
.track { flex:1; height:2px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; }
.fill {
  height:100%; border-radius:2px;
  background:var(--accent);
  opacity:.6;
  transition:width 1.2s cubic-bezier(.4,0,.2,1);
}

.rr-badge {
  font-family:'DM Mono',monospace; font-size:13px; font-weight:500;
  min-width:36px; text-align:right; line-height:1; flex-shrink:0;
}
.rr-badge .sub {
  display:block; font-size:8px; letter-spacing:1px;
  opacity:.35; margin-top:2px; text-align:right;
  font-family:'DM Sans',sans-serif;
}
.rr-badge.pos { color:#5fffb5; }
.rr-badge.neg { color:#ff5060; }
.rr-badge.neu { color:rgba(255,255,255,.2); }
.rr-badge.pop { animation:pop .35s ease; }

/* ── Match card ──────────────────────────────────────── */
.match-card {
  display:flex; align-items:center; gap:9px;
  padding:7px 14px 7px 10px;
}
.match-agent-wrap {
  flex-shrink:0; width:30px; height:30px; border-radius:7px;
  overflow:hidden; background:rgba(255,255,255,.06);
  display:flex; align-items:center; justify-content:center;
}
.match-agent-wrap img { width:30px; height:30px; object-fit:cover; }
.match-info { flex:1; min-width:0; }
.match-agent-name { font-size:12px; font-weight:600; color:var(--text-secondary); line-height:1; }
.match-kda-map {
  font-family:'DM Mono',monospace; font-size:9px;
  color:var(--text-tertiary); margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.match-result {
  font-size:10px; font-weight:700; letter-spacing:.8px;
  padding:3px 8px; border-radius:5px; flex-shrink:0;
}
.match-result.win  { color:#5fffb5; background:rgba(95,255,181,.1); }
.match-result.loss { color:#ff5060; background:rgba(255,80,96,.1); }
.match-result.draw { color:rgba(255,255,255,.3); background:rgba(255,255,255,.05); }

/* ── Streak card ─────────────────────────────────────── */
.streak-card {
  display:flex; align-items:center;
  padding:8px 14px; gap:5px;
}
.streak-label {
  font-size:9px; font-weight:600; letter-spacing:1px;
  text-transform:uppercase; color:rgba(255,255,255,.2);
  margin-right:4px; flex-shrink:0;
}
.streak-dots { display:flex; gap:4px; align-items:center; }
.s-dot {
  width:22px; height:5px; border-radius:3px;
  transition: background .3s;
}
.s-dot.win  { background:#5fffb5; opacity:.75; }
.s-dot.loss { background:#ff5060; opacity:.75; }
.s-dot.draw { background:rgba(255,255,255,.2); }
.s-dot.empty { background:rgba(255,255,255,.07); }

/* ── Animations ──────────────────────────────────────── */
@keyframes pop {
  0%   { transform:scale(.8); opacity:0; }
  60%  { transform:scale(1.1); }
  100% { transform:scale(1); opacity:1; }
}
</style>
</head>
<body>

<div class="container" id="container">
  <!-- Rank -->
  <div class="card rank-card">
    <div class="rank-icon">
      <img id="ico" src="" alt="" style="display:none">
    </div>
    <div class="rank-info">
      <div class="rank-name" id="rankName">—</div>
      <div class="peak-rank" id="peakRank" style="display:none"></div>
      <div class="session-rr" id="sessionRR" style="display:none"></div>
      <div class="rr-row">
        <div class="rr-label" id="rrLabel">0 RR</div>
        <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="rr-badge neu" id="badge">
      <span id="badgeNum">—</span>
      <span class="sub">LAST</span>
    </div>
  </div>

  <!-- Last match -->
  <div class="card match-card" id="matchCard" style="display:none">
    <div class="match-agent-wrap">
      <img id="matchIcon" src="" alt="" style="display:none">
    </div>
    <div class="match-info">
      <div class="match-agent-name" id="matchAgent">—</div>
      <div class="match-kda-map" id="matchKda">—</div>
    </div>
    <div class="match-result draw" id="matchResult">?</div>
  </div>

  <!-- Streak -->
  <div class="card streak-card" id="streakCard" style="display:none">
    <span class="streak-label">STREAK</span>
    <div class="streak-dots" id="streakDots"></div>
  </div>
</div>

<script>
let cfg = null;
let prevChange = undefined;
let firstLoad = true;
const SS_KEY = 'valo_session_start_rr';

// ── Applique les options d'affichage ────────────────────────
function applyDisplay(d) {
  const r = document.documentElement;
  let opacity = d.bg_opacity ?? 0.75;
  // Normalize opacity: if > 1, assume it's a percentage (0-100)
  if (opacity > 1) opacity = opacity / 100;
  const bg = `rgba(0,0,0,${opacity})`;
  r.style.setProperty('--card-bg', bg);
  r.style.setProperty('--accent', d.accent_color || '#ff4655');
  r.style.setProperty('--text-primary', d.text_primary || '#ffffff');
  r.style.setProperty('--text-secondary', d.text_secondary || 'rgba(255,255,255,0.6)');
  r.style.setProperty('--text-tertiary', d.text_tertiary || 'rgba(255,255,255,0.3)');
  r.style.setProperty('--w', (d.widget_width || 300) + 'px');
  document.body.style.width = (d.widget_width || 300) + 'px';
}

// ── Session RR ───────────────────────────────────────────────
let sessionStartRR = null;

function initSessionRR(rr) {
  const stored = sessionStorage.getItem(SS_KEY);
  sessionStartRR = stored !== null ? parseInt(stored, 10) : rr;
  if (stored === null) sessionStorage.setItem(SS_KEY, rr);
  renderSessionRR(rr);
}

function renderSessionRR(rr) {
  if (!(cfg?.display?.show_session_rr ?? true)) return;
  if (sessionStartRR === null) return;
  const diff = rr - sessionStartRR;
  const el = document.getElementById('sessionRR');
  if (diff === 0) { el.style.display = 'none'; return; }
  const cls = diff > 0 ? 'pos' : 'neg';
  el.innerHTML = `SESSION <span class="val ${cls}">${diff > 0 ? '+' : ''}${diff} RR</span>`;
  el.style.display = 'block';
}

// ── Rank ─────────────────────────────────────────────────────
async function refreshRank() {
  try {
    const res = await fetch('/api/rank');
    let d = await res.json();
    if (!res.ok) return;

    // Add test data if showing peak rank in preview mode
    const isPreview = new URLSearchParams(window.location.search).has('opacity');
    if (isPreview && (cfg?.display?.show_peak_rank ?? true) && (!d.peak_rank || d.peak_rank === d.rank)) {
      d.peak_rank = 'Radiant';
      d.peak_tier = 27; // Radiant tier ID
    }
    if (isPreview && (cfg?.display?.show_session_rr ?? true)) {
      sessionStartRR = 80;
      d.rr = d.rr || 0;
      d.rr = Math.max(90, d.rr); // Ensure we have RR change for display
    }

    document.getElementById('rankName').textContent = d.rank;
    document.getElementById('rrLabel').textContent  = d.rr + ' RR';
    document.getElementById('fill').style.width     = Math.min(100, Math.max(0, d.rr)) + '%';

    if (d.tier > 0) {
      const ico = document.getElementById('ico');
      ico.style.display = 'block';
      ico.src = d.rank_icon;
      ico.onerror = () => {
        ico.src = `https://media.valorant-api.com/competitivetiers/564d8e28-c226-3180-6285-e48a390db8b1/${d.tier}/largeicon.png`;
      };
    }

    // Peak rank
    const peakEl = document.getElementById('peakRank');
    if ((cfg?.display?.show_peak_rank ?? true) && d.peak_rank && d.peak_rank !== d.rank) {
      let peakIcon = '';
      if (d.peak_tier) {
        peakIcon = `<img src="https://media.valorant-api.com/competitivetiers/564d8e28-c226-3180-6285-e48a390db8b1/${d.peak_tier}/smallicon.png" alt="peak" class="peak-icon">`;
      }
      peakEl.innerHTML = `PEAK ${peakIcon}`;
      peakEl.style.display = 'block';
    } else {
      peakEl.style.display = 'none';
    }

    const chg = d.rr_change;
    const badge = document.getElementById('badge');
    badge.className = 'rr-badge ' + (chg === null ? 'neu' : chg > 0 ? 'pos' : chg < 0 ? 'neg' : 'neu');
    document.getElementById('badgeNum').textContent = chg === null ? '—' : (chg > 0 ? '+' : '') + chg;
    if (prevChange !== undefined && prevChange !== chg) {
      badge.classList.add('pop');
      setTimeout(() => badge.classList.remove('pop'), 400);
    }
    prevChange = chg;

    initSessionRR(d.rr);

    if (firstLoad) {
      setTimeout(() => document.getElementById('container').classList.add('show'), 80);
      firstLoad = false;
    }
  } catch(e) {}
}

// ── Matches ───────────────────────────────────────────────────
async function refreshMatches() {
  const showMatch  = cfg?.display?.show_last_match ?? true;
  const showStreak = cfg?.display?.show_streak     ?? true;
  if (!showMatch && !showStreak) return;

  try {
    const size = showStreak ? 5 : 1;
    const res  = await fetch(`/api/matches?size=${size}`);
    if (!res.ok) return;
    const matches = await res.json();
    if (!matches?.length) return;

    // Last match
    if (showMatch) {
      const m = matches[0];
      const card = document.getElementById('matchCard');
      card.style.display = 'flex';

      const icon = document.getElementById('matchIcon');
      if (m.agent_icon) {
        icon.src = m.agent_icon;
        icon.style.display = 'block';
        icon.onerror = () => { icon.style.display = 'none'; };
      }
      document.getElementById('matchAgent').textContent = m.agent;
      document.getElementById('matchKda').textContent =
        `${m.kills}/${m.deaths}/${m.assists}${m.map ? ' • ' + m.map : ''}`;

      const res2 = document.getElementById('matchResult');
      if (m.won === null)       { res2.className = 'match-result draw'; res2.textContent = '?'; }
      else if (m.won)           { res2.className = 'match-result win';  res2.textContent = 'V'; }
      else                      { res2.className = 'match-result loss'; res2.textContent = 'D'; }
    }

    // Streak
    if (showStreak) {
      const streakCard = document.getElementById('streakCard');
      const dots = document.getElementById('streakDots');
      streakCard.style.display = 'flex';
      dots.innerHTML = '';
      // Affiche 5 dots (les plus anciens à gauche, le plus récent à droite)
      const filled = matches.slice(0, 5).reverse();
      for (let i = 0; i < 5; i++) {
        const dot = document.createElement('div');
        const m = filled[i];
        if (!m) {
          dot.className = 's-dot empty';
        } else if (m.won === true)  { dot.className = 's-dot win'; }
        else if (m.won === false)   { dot.className = 's-dot loss'; }
        else                        { dot.className = 's-dot draw'; }
        dots.appendChild(dot);
      }
    }
  } catch(e) {}
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/config');
    cfg = await res.json();

    // Check for preview query parameters (from setup.html)
    const params = new URLSearchParams(window.location.search);
    if (params.size > 1 || (params.size === 1 && !params.has('ts'))) {
      // Override display settings with preview parameters
      const display = cfg.display || {};

      if (params.has('opacity')) display.bg_opacity = parseFloat(params.get('opacity'));
      if (params.has('accentColor')) display.accent_color = params.get('accentColor');
      if (params.has('widgetWidth')) display.widget_width = parseInt(params.get('widgetWidth'));
      if (params.has('refreshRank')) display.refresh_rank = parseInt(params.get('refreshRank'));
      if (params.has('showPeakRank')) display.show_peak_rank = params.get('showPeakRank') === 'true';
      if (params.has('showSessionRR')) display.show_session_rr = params.get('showSessionRR') === 'true';
      if (params.has('showLastMatch')) display.show_last_match = params.get('showLastMatch') === 'true';
      if (params.has('showStreak')) display.show_streak = params.get('showStreak') === 'true';

      cfg.display = display;
    }

    applyDisplay(cfg.display || {});
  } catch(e) {}

  const interval = (cfg?.display?.refresh_rank || 120) * 1000;

  refreshRank();
  refreshMatches();
  setInterval(refreshRank,   interval);
  setInterval(refreshMatches, 120000);

  // Reload config every 5 seconds to pick up changes from setup.html
  setInterval(async () => {
    try {
      const res = await fetch('/api/config');
      if (res.ok) {
        cfg = await res.json();
        applyDisplay(cfg.display || {});
      }
    } catch(e) {}
  }, 5000);
}

init();
</script>
</body>
</html>
